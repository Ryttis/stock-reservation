services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: stock_reservation_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://app:app@database:3306/stock_reservation?serverVersion=8.4&charset=utf8mb4

  nginx:
    image: nginx:1.27-alpine
    container_name: stock_reservation_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  database:
    image: mysql:8.4
    container_name: stock_reservation_mysql
    environment:
      MYSQL_DATABASE: stock_reservation
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: stock_reservation_phpmyadmin
    environment:
      PMA_HOST: database
      PMA_USER: app
      PMA_PASSWORD: app
    ports:
      - "8081:80"
    depends_on:
      database:
        condition: service_healthy

volumes:
  database_data:
